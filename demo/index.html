<style>
  :root{
    --paper:#FBFAF3; --well:#F4F1E8; --ink:#211D14; --ink-soft:#5C5645;
    --line:#E4DFD1; --green:#1E7A47;
    --mono: ui-monospace, "SFMono-Regular", "Geist Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-tap-highlight-color:rgba(30,122,71,.10); }
  body{ display:flex; flex-direction:column; }

  .demobar{
    display:flex; align-items:center; gap:.9rem; flex:none;
    padding:.6rem 1.1rem; border-bottom:1px solid var(--line); background:var(--paper);
  }
  .brand{ display:inline-flex; align-items:center; gap:.55rem; text-decoration:none; color:var(--ink); min-width:0; }
  .badge{
    font-family:var(--mono); font-weight:600; font-size:.72rem; letter-spacing:-.02em; line-height:1;
    border:3px solid transparent; border-radius:7px; padding:.22rem .44rem; flex:none;
    background:
      linear-gradient(var(--paper),var(--paper)) padding-box,
      linear-gradient(92deg,#E1483E,#F08A24,#EFC939,#4FAE4A,#3E7FD9,#9B4FB8) border-box;
  }
  .wm{ font-family:var(--mono); font-weight:600; font-size:.95rem; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tag{
    font-family:var(--mono); font-size:.58rem; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; color:var(--green); display:inline-flex; align-items:center; gap:.4rem;
  }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--green); flex:none; animation:pulse 2.2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.5; } }
  .cta{
    margin-left:auto; flex:none; font-family:var(--mono); font-size:.64rem; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase; text-decoration:none; color:var(--paper);
    background:var(--ink); border-radius:999px; padding:.5rem .95rem; white-space:nowrap;
    transition:background .2s ease;
  }
  .cta:hover{ background:#000; }

  .note{
    flex:none; font-family:var(--mono); font-size:.6rem; letter-spacing:.02em; color:var(--ink-soft);
    text-align:center; padding:.5rem 1rem; border-bottom:1px solid var(--line); background:var(--well);
  }
  .note b{ color:var(--ink); font-weight:600; }

  .frame-wrap{ flex:1; min-height:0; position:relative; background:var(--well); }
  .loading{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:.7rem; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft);
  }
  iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; }
  .brand-logo{ height:27px; width:auto; display:block; }
  .brand-logo .cur{ animation:brand-cur 1.1s step-end infinite; }
  @keyframes brand-cur{ 50%{ opacity:0; } }
  @media (prefers-reduced-motion: reduce){ .brand-logo .cur{ animation:none; } }

  @media (max-width:560px){
    .tag{ display:none; }
    .wm{ font-size:.82rem; }
    .cta{ font-size:.58rem; padding:.5rem .9rem; min-height:40px; display:inline-flex; align-items:center; }
    .note{ font-size:.55rem; }
  }
</style>
